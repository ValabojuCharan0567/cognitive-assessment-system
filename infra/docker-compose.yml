services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    environment:
      DATASET_PATH: /data/dataset
      PORT: 8000
      FLASK_DEBUG: 0
      FLASK_SSL_ADHOC: 0
    volumes:
      - ${HOST_DATASET_PATH}:/data/dataset:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/cloud/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
